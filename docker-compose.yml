# ERPNext v15 with HRMS - Docker Compose
# Based on official Frappe Docker setup

services:
  backend:
    image: erpnext-hrms:${APP_VERSION}
    build: .
    container_name: ${APP_NAME}-backend
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      create-site:
        condition: service_completed_successfully
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${DB_MARIA_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_MARIA_PASSWORD}

  configurator:
    image: erpnext-hrms:${APP_VERSION}
    build: .
    container_name: ${APP_NAME}-configurator
    restart: "no"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        echo '{}' > sites/common_site_config.json;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  create-site:
    image: erpnext-hrms:${APP_VERSION}
    build: .
    container_name: ${APP_NAME}-create-site
    restart: "no"
    networks:
      - backend
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      SITE_NAME: ${APP_URL:-frontend}
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site $$SITE_NAME --mariadb-user-host-login-scope='%' --admin-password=${APP_PASSWORD} --db-root-username=root --db-root-password=${DB_MARIA_PASSWORD} --install-app erpnext --install-app hrms --install-app crm --install-app helpdesk --install-app insights --install-app wiki --install-app drive --install-app india_compliance --set-default;

  db:
    image: mariadb:10.6
    container_name: ${APP_NAME}-db
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: mysqladmin ping -h localhost --password=${DB_MARIA_PASSWORD}
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_MARIA_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_MARIA_PASSWORD}
    volumes:
      - ./data/db:/var/lib/mysql
    ports:
      - "${DB_MARIA_PORT}:3306"

  frontend:
    image: erpnext-hrms:${APP_VERSION}
    build: .
    container_name: ${APP_NAME}-frontend
    restart: unless-stopped
    networks:
      - frontend
      - backend
    depends_on:
      - websocket
      - backend
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: ${APP_URL:-frontend}
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs
    ports:
      - "${APP_HTTP_PORT}:8080"

  queue-long:
    image: erpnext-hrms:${APP_VERSION}
    build: .
    container_name: ${APP_NAME}-queue-long
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    image: erpnext-hrms:${APP_VERSION}
    build: .
    container_name: ${APP_NAME}-queue-short
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  redis-cache:
    image: redis:8.2-alpine
    container_name: ${APP_NAME}-redis-cache
    restart: unless-stopped
    networks:
      - backend

  redis-queue:
    image: redis:8.2-alpine
    container_name: ${APP_NAME}-redis-queue
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ./data/redis-queue:/data

  scheduler:
    image: erpnext-hrms:${APP_VERSION}
    build: .
    container_name: ${APP_NAME}-scheduler
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - bench
      - schedule
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs

  websocket:
    image: erpnext-hrms:${APP_VERSION}
    build: .
    container_name: ${APP_NAME}-websocket
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - ./data/sites:/home/frappe/frappe-bench/sites
      - ./data/logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${APP_NAME}-cloudflared
    restart: unless-stopped
    networks:
      - frontend
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    depends_on:
      - frontend

networks:
  frontend:
    name: ${APP_NAME}-frontend
    driver: bridge
  backend:
    name: ${APP_NAME}-backend
    driver: bridge
# All data is stored in local ./data/ directories for easy backup and access
# No named volumes needed - using bind mounts instead

